name: "Prospera Law 1.0 Guard"
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  governance-enforcement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "Enforce Law 1.0 Rules"
        shell: pwsh
        run: |
          $StandardFolders = @("00_governance","01_docs","02_kernel","03_engines","04_workflows","05_products","06_memory","07_data","08_tools","09_ip","10_agents","11_interfaces","99_archive",".github","node_modules")
          $FileWhiteList = @(".gitignore",".env",".env.example","README.md","readme.md","GOVERNANCE_STATUS.md","SYSTEM_INDEX.md","prospera_resolver.json","AGENTS.md","CHANGELOG.md","LICENSE","package.json","package-lock.json","requirements.txt","Makefile","docker-compose.yml","Dockerfile")
          $ExtWhiteList = @(".md",".yml",".yaml",".json",".txt",".ps1",".py",".js",".ts",".sh",".env",".gitignore",".lock",".toml",".cfg",".ini")
          $ViolationCount = 0
          Write-Host "--- Scanning Root Structure ---"
          $RootItems = Get-ChildItem -Path "."
          foreach ($item in $RootItems) {
              if ($item.PSIsContainer) {
                  if ($StandardFolders -notcontains $item.Name) {
                      Write-Host " [GOV_VIOLATION] repo: $Env:GITHUB_REPOSITORY folder: $($item.Name) reason: ILLEGAL_ROOT_FOLDER"
                      $ViolationCount++
                  }
              } else {
                  $inWhiteList = $FileWhiteList -contains $item.Name
                  $extAllowed = $ExtWhiteList -contains $item.Extension
                  if (-not $inWhiteList -and -not $extAllowed) {
                      Write-Host " [GOV_VIOLATION] repo: $Env:GITHUB_REPOSITORY file: $($item.Name) reason: ROOT_POLLUTION"
                      $ViolationCount++
                  }
              }
          }
          Write-Host "--- Scanning Filename Length ---"
          $AllFiles = Get-ChildItem -Recurse -File | Where-Object { $_.FullName -notmatch "99_archive|node_modules|\.git" }
          foreach ($file in $AllFiles) {
              if ($file.Name.Length -gt 60) {
                  Write-Host " [GOV_VIOLATION] repo: $Env:GITHUB_REPOSITORY file: $($file.FullName) reason: FILENAME_TOO_LONG"
                  $ViolationCount++
              }
          }
          if ($ViolationCount -gt 0) {
              Write-Host "LAW 1.0 VIOLATED: $ViolationCount issues found."
              exit 1
          } else {
              Write-Host "LAW 1.0 PASSED"
          }